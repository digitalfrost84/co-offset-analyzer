<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO Offset Analyzer</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root {
            color-scheme: dark;
            --bg: #111418;
            --panel: #191f26;
            --panel-soft: #202833;
            --panel-strong: #263241;
            --text: #eef3f7;
            --muted: #9eacba;
            --line: #33404f;
            --accent: #52b788;
            --accent-strong: #3a9f72;
            --warn: #f2b84b;
            --danger: #ff6b6b;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(82, 183, 136, 0.16), transparent 34rem),
                linear-gradient(135deg, #0f1216 0%, #151b21 52%, #12161b 100%);
            color: var(--text);
            font-family: Inter, "Segoe UI", Arial, sans-serif;
            line-height: 1.45;
        }

        .app {
            width: min(1440px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 44px;
        }

        .topbar {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 22px;
        }

        .eyebrow {
            margin: 0 0 6px;
            color: var(--accent);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        h1,
        h2,
        h3,
        p {
            margin-top: 0;
        }

        h1 {
            margin-bottom: 0;
            font-size: clamp(28px, 4vw, 48px);
            letter-spacing: 0;
            line-height: 1.05;
        }

        h2 {
            margin-bottom: 16px;
            font-size: 22px;
        }

        h3 {
            margin-bottom: 12px;
            font-size: 16px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 7px 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: rgba(25, 31, 38, 0.82);
            color: var(--muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(320px, 430px) minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .panel {
            background: rgba(25, 31, 38, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .controls {
            position: sticky;
            top: 18px;
            padding: 20px;
        }

        .results-panel {
            min-height: 560px;
            padding: 20px;
        }

        .section {
            padding: 16px 0;
            border-top: 1px solid var(--line);
        }

        .section:first-of-type {
            padding-top: 0;
            border-top: 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: #c8d2dc;
            font-size: 13px;
            font-weight: 700;
        }

        input[type="number"],
        input[type="file"],
        textarea,
        select {
            width: 100%;
            min-height: 42px;
            padding: 10px 11px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #10151b;
            color: var(--text);
            font: inherit;
            outline: none;
            transition: border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        input[type="number"]:focus,
        input[type="file"]:focus,
        textarea:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(82, 183, 136, 0.18);
        }

        input[type="file"] {
            padding: 8px;
            color: var(--muted);
        }

        textarea {
            min-height: 188px;
            resize: vertical;
            font-family: "Cascadia Mono", Consolas, monospace;
            font-size: 12px;
        }

        .field-note {
            margin: 7px 0 0;
            color: var(--muted);
            font-size: 12px;
        }

        .offset-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .button-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .offset-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(84px, 1fr));
            gap: 9px;
        }

        .offset-input {
            padding: 10px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--panel-soft);
        }

        .offset-input label {
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 12px;
        }

        .offset-input input {
            min-height: 36px;
            margin: 0;
            text-align: center;
            font-weight: 800;
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-top: 16px;
        }

        button {
            min-height: 42px;
            border: 0;
            border-radius: 6px;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
            transition: transform 0.12s ease, background 0.16s ease, border-color 0.16s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            cursor: wait;
            opacity: 0.62;
            transform: none;
        }

        .primary-btn {
            background: var(--accent);
            color: #08110d;
        }

        .primary-btn:hover {
            background: #68c99c;
        }

        .ghost-btn {
            padding: 0 14px;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--text);
        }

        .ghost-btn:hover {
            border-color: var(--accent);
            background: rgba(82, 183, 136, 0.1);
        }

        .empty-state {
            display: grid;
            place-items: center;
            min-height: 516px;
            border: 1px dashed var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            text-align: center;
        }

        .empty-state-inner {
            width: min(440px, 100%);
            padding: 22px;
        }

        .empty-icon {
            display: inline-grid;
            place-items: center;
            width: 58px;
            height: 58px;
            margin-bottom: 16px;
            border-radius: 50%;
            background: rgba(82, 183, 136, 0.14);
            color: var(--accent);
            font-size: 28px;
            font-weight: 900;
        }

        .empty-state p {
            margin-bottom: 0;
            color: var(--muted);
        }

        .message {
            padding: 14px 15px;
            border-radius: 6px;
            border: 1px solid;
            font-weight: 700;
        }

        .message.error {
            border-color: rgba(255, 107, 107, 0.45);
            background: rgba(255, 107, 107, 0.12);
            color: #ffd2d2;
        }

        .message.success {
            border-color: rgba(82, 183, 136, 0.45);
            background: rgba(82, 183, 136, 0.12);
            color: #c9f3dc;
        }

        .message.warn {
            border-color: rgba(242, 184, 75, 0.48);
            background: rgba(242, 184, 75, 0.12);
            color: #ffe0a3;
        }

        .message.info {
            border-color: rgba(111, 171, 214, 0.42);
            background: rgba(111, 171, 214, 0.12);
            color: #d7eafa;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(4, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 18px;
        }

        .metric {
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--panel-soft);
        }

        .metric.good {
            border-color: rgba(82, 183, 136, 0.45);
            background: rgba(82, 183, 136, 0.1);
        }

        .metric.warn {
            border-color: rgba(242, 184, 75, 0.48);
            background: rgba(242, 184, 75, 0.1);
        }

        .metric.bad {
            border-color: rgba(255, 107, 107, 0.48);
            background: rgba(255, 107, 107, 0.1);
        }

        .metric-label {
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .metric-value {
            font-size: 24px;
            font-weight: 900;
            line-height: 1.1;
        }

        .metric-unit {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .result-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.9fr);
            gap: 14px;
        }

        .result-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel-soft);
            overflow: hidden;
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 13px 14px;
            border-bottom: 1px solid var(--line);
            background: var(--panel-strong);
        }

        .card-head h3 {
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            text-align: right;
            font-size: 13px;
        }

        th:first-child,
        td:first-child {
            text-align: left;
        }

        th {
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .positive {
            color: #ffb4a8;
        }

        .negative {
            color: #a9e8c7;
        }

        .recommendation-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(104px, 1fr));
            gap: 9px;
            padding: 14px;
        }

        .rec-chip {
            padding: 11px;
            border: 1px solid rgba(82, 183, 136, 0.28);
            border-radius: 6px;
            background: rgba(82, 183, 136, 0.1);
        }

        .rec-chip strong {
            display: block;
            margin-bottom: 4px;
            color: var(--muted);
            font-size: 12px;
        }

        .rec-value {
            font-size: 24px;
            font-weight: 900;
        }

        .rec-change {
            color: var(--muted);
            font-size: 12px;
        }

        .copy-box {
            margin: 0 14px 14px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #10151b;
            color: #d8e3eb;
            font-family: "Cascadia Mono", Consolas, monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }

        .file-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        #fileName {
            color: var(--muted);
            font-size: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .progress-wrap {
            display: grid;
            gap: 7px;
            margin-top: 10px;
        }

        .progress-wrap[hidden] {
            display: none;
        }

        .progress-head {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        .progress-detail {
            min-width: 0;
            overflow: hidden;
            text-align: right;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .progress-track {
            height: 8px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 999px;
            background: #10151b;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent), #9ee6bd);
            transition: width 0.14s ease;
        }

        .progress-wrap.indeterminate .progress-bar {
            width: 40%;
            animation: progress-sweep 1.15s ease-in-out infinite;
        }

        @keyframes progress-sweep {
            from {
                transform: translateX(-110%);
            }

            to {
                transform: translateX(280%);
            }
        }

        @media (max-width: 980px) {
            .layout,
            .result-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                position: static;
            }

            .metrics {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 620px) {
            .app {
                width: min(100% - 20px, 1440px);
                padding-top: 16px;
            }

            .topbar,
            .offset-toolbar {
                align-items: stretch;
                flex-direction: column;
            }

            .button-row {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .status-pill {
                width: 100%;
                justify-content: center;
            }

            .form-grid,
            .metrics,
            .actions {
                grid-template-columns: 1fr;
            }

            .metric-value,
            .rec-value {
                font-size: 21px;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="topbar">
            <div>
                <p class="eyebrow">Curve Optimizer</p>
                <h1>CO Offset Analyzer</h1>
            </div>
            <div id="status" class="status-pill">Waiting for CSV data</div>
        </header>

        <div class="layout">
            <section class="panel controls" aria-label="Analyzer controls">
                <div class="section">
                    <h2>Inputs</h2>
                    <div class="form-grid">
                        <div>
                            <label for="coreCount">Core count</label>
                            <select id="coreCount" onchange="updateCoreCountMode()">
                                <option value="auto" selected>Auto-detect</option>
                                <option value="4">4 cores</option>
                                <option value="6">6 cores</option>
                                <option value="8">8 cores</option>
                                <option value="10">10 cores</option>
                                <option value="12">12 cores</option>
                                <option value="14">14 cores</option>
                                <option value="16">16 cores</option>
                                <option value="24">24 cores</option>
                                <option value="32">32 cores</option>
                            </select>
                            <p id="coreDetect" class="field-note">Auto: waiting for CSV</p>
                        </div>
                        <div>
                            <label for="minCurrent">Minimum current (A)</label>
                            <input type="number" id="minCurrent" value="70" step="0.1">
                        </div>
                        <div>
                            <label for="mvStep">mV per CO step</label>
                            <input type="number" id="mvStep" value="3.0" step="0.1">
                        </div>
                        <div>
                            <label for="analysisScope">Analysis scope</label>
                            <select id="analysisScope" onchange="rerunIfReady()">
                                <option value="auto" selected>Auto CCD</option>
                                <option value="whole">Whole CPU</option>
                            </select>
                            <p id="scopeDetect" class="field-note">Auto: waiting for CSV</p>
                        </div>
                        <div>
                            <label for="csvFile">HWiNFO64 CSV file</label>
                            <input type="file" id="csvFile" accept=".csv" onchange="handleFileUpload(event)">
                        </div>
                    </div>
                    <div class="file-line">
                        <p class="field-note">Upload a log or paste CSV content below.</p>
                        <span id="fileName"></span>
                    </div>
                    <div id="progressWrap" class="progress-wrap" hidden aria-live="polite">
                        <div class="progress-head">
                            <span id="progressPhase">Idle</span>
                            <span id="progressDetail" class="progress-detail"></span>
                        </div>
                        <div class="progress-track">
                            <div id="progressBar" class="progress-bar"></div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="offset-toolbar">
                        <h3>Current CO offsets</h3>
                        <div class="button-row">
                            <button type="button" class="ghost-btn" onclick="nudgeAllOffsets(-1)">-1</button>
                            <button type="button" class="ghost-btn" onclick="nudgeAllOffsets(1)">+1</button>
                            <button type="button" class="ghost-btn" onclick="pasteOffsetsFromClipboard()">Paste</button>
                            <button type="button" class="ghost-btn" onclick="resetOffsets()">Reset</button>
                        </div>
                    </div>
                    <div id="offsetInputs" class="offset-inputs"></div>
                </div>

                <div class="section">
                    <label for="csvText">CSV content</label>
                    <textarea id="csvText" placeholder="Paste HWiNFO64 CSV data here..."></textarea>
                    <div class="actions">
                        <button id="analyzeButton" class="primary-btn" onclick="analyzeData()">Analyze</button>
                        <button type="button" class="ghost-btn" onclick="clearCsv()">Clear</button>
                    </div>
                </div>
            </section>

            <section class="panel results-panel" aria-label="Analyzer results">
                <div id="results" class="empty-state">
                    <div class="empty-state-inner">
                        <div class="empty-icon">CO</div>
                        <h2>Ready to analyze</h2>
                        <p>Recommended per-core offsets will appear here after a valid HWiNFO64 CSV is loaded.</p>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script>
        let detectedCoreCount = null;
        let detectTimer = null;
        let autoAnalyzeTimer = null;
        let latestRecommendations = null;
        let uploadedCsvText = '';
        let uploadedCsvName = '';
        let activeAnalysisId = 0;
        const DEFAULT_CSV_PLACEHOLDER = 'Paste HWiNFO64 CSV data here...';
        const LARGE_TEXTAREA_LIMIT = 2 * 1024 * 1024;
        const ANALYSIS_YIELD_MS = 32;

        updateOffsetInputs();
        document.getElementById('csvText').addEventListener('input', () => {
            uploadedCsvText = '';
            uploadedCsvName = '';
            activeAnalysisId++;
            document.getElementById('fileName').textContent = '';
            document.getElementById('csvText').placeholder = DEFAULT_CSV_PLACEHOLDER;
            clearProgress();
            clearTimeout(detectTimer);
            clearTimeout(autoAnalyzeTimer);
            detectTimer = setTimeout(() => {
                const csvText = getActiveCsvText();
                updateDetectedCoreCountFromText(csvText);
                scheduleAutoAnalyze(csvText);
            }, 180);
        });

        function setStatus(text) {
            document.getElementById('status').textContent = text;
        }

        function getActiveCsvText() {
            return uploadedCsvText || document.getElementById('csvText').value;
        }

        function setProgress(phase, percent = null, detail = '') {
            const wrap = document.getElementById('progressWrap');
            const bar = document.getElementById('progressBar');
            wrap.hidden = false;
            document.getElementById('progressPhase').textContent = phase;
            document.getElementById('progressDetail').textContent = detail;
            setStatus(phase);

            if (Number.isFinite(percent)) {
                const safePercent = Math.max(0, Math.min(100, percent));
                wrap.classList.remove('indeterminate');
                bar.style.width = `${safePercent}%`;
                bar.style.transform = '';
            } else {
                wrap.classList.add('indeterminate');
                bar.style.width = '';
                bar.style.transform = '';
            }
        }

        function clearProgress() {
            const wrap = document.getElementById('progressWrap');
            if (!wrap) return;

            wrap.hidden = true;
            wrap.classList.remove('indeterminate');
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressPhase').textContent = 'Idle';
            document.getElementById('progressDetail').textContent = '';
        }

        function setAnalysisBusy(isBusy) {
            const button = document.getElementById('analyzeButton');
            if (button) button.disabled = isBusy;
        }

        function yieldToBrowser() {
            return new Promise(resolve => setTimeout(resolve, 0));
        }

        async function paintProgress(phase, percent = null, detail = '') {
            setProgress(phase, percent, detail);
            await yieldToBrowser();
        }

        function cancelError() {
            const error = new Error('Analysis cancelled');
            error.cancelled = true;
            return error;
        }

        function ensureAnalysisCurrent(analysisId) {
            if (analysisId !== activeAnalysisId) {
                throw cancelError();
            }
        }

        function formatBytes(bytes) {
            if (!Number.isFinite(bytes)) return '';
            const units = ['B', 'KB', 'MB', 'GB'];
            let size = bytes;
            let unit = 0;

            while (size >= 1024 && unit < units.length - 1) {
                size /= 1024;
                unit++;
            }

            const digits = unit === 0 || size >= 10 ? 0 : 1;
            return `${size.toFixed(digits)} ${units[unit]}`;
        }

        function hasCsvContent(text) {
            return /\S/.test(text);
        }

        function rerunIfReady() {
            updateScopeLabel(null);
            const csvText = getActiveCsvText();
            if (canAnalyzeText(csvText)) {
                analyzeData();
            }
        }

        function updateCoreCountMode() {
            updateCoreCountLabel();
            updateOffsetInputs();
        }

        function resolveCoreCount() {
            const selected = document.getElementById('coreCount').value;
            return selected === 'auto' ? (detectedCoreCount || 8) : parseInt(selected);
        }

        function updateCoreCountLabel() {
            const label = document.getElementById('coreDetect');
            const selected = document.getElementById('coreCount').value;

            if (selected === 'auto') {
                label.textContent = detectedCoreCount ? `Auto: ${detectedCoreCount} cores detected` : 'Auto: waiting for CSV';
            } else {
                label.textContent = `Manual override: ${selected} cores`;
            }
        }

        function updateScopeLabel(groups) {
            const label = document.getElementById('scopeDetect');
            const selected = document.getElementById('analysisScope').value;

            if (selected === 'whole') {
                label.textContent = 'Manual: one CPU-wide baseline';
                return;
            }

            if (!groups) {
                label.textContent = 'Auto: waiting for CSV';
                return;
            }

            const groupCount = Object.keys(groups).length;
            label.textContent = groupCount > 1
                ? `Auto: ${groupCount} CCD groups detected`
                : 'Auto: single CCD / whole CPU';
        }

        function updateOffsetInputs() {
            const coreCount = resolveCoreCount();
            const container = document.getElementById('offsetInputs');
            const previous = getCurrentOffsetsSafe();
            container.innerHTML = '';
            updateCoreCountLabel();

            for (let i = 0; i < coreCount; i++) {
                const div = document.createElement('div');
                div.className = 'offset-input';
                div.innerHTML = `
                    <label for="offset${i}">Core ${i}</label>
                    <input type="number" id="offset${i}" value="${previous[i] ?? 0}" min="-50" max="30">
                `;
                container.appendChild(div);
            }
        }

        function getCurrentOffsetsSafe() {
            const container = document.getElementById('offsetInputs');
            if (!container) return {};

            const offsets = {};
            container.querySelectorAll('input[id^="offset"]').forEach(input => {
                const coreIdx = parseInt(input.id.replace('offset', ''));
                offsets[coreIdx] = parseInt(input.value) || 0;
            });
            return offsets;
        }

        function resetOffsets() {
            document.querySelectorAll('#offsetInputs input').forEach(input => {
                input.value = 0;
            });
            setStatus('Offsets reset');
        }

        function nudgeAllOffsets(amount) {
            document.querySelectorAll('#offsetInputs input').forEach(input => {
                const min = parseInt(input.min);
                const max = parseInt(input.max);
                const current = parseInt(input.value) || 0;
                input.value = Math.max(min, Math.min(max, current + amount));
            });
            setStatus(`${amount > 0 ? 'Increased' : 'Decreased'} all current offsets by 1`);
        }

        function applyOffsetsToInputs(offsets) {
            let applied = 0;

            Object.entries(offsets).forEach(([core, offset]) => {
                const input = document.getElementById(`offset${core}`);
                if (!input) return;

                input.value = Math.max(-50, Math.min(30, parseInt(offset)));
                applied++;
            });

            return applied;
        }

        function parseOffsetsText(text) {
            const offsets = {};
            const corePattern = /Core\s+(\d+)\s*:\s*(-?\d+)/gi;
            let match;

            while ((match = corePattern.exec(text)) !== null) {
                offsets[parseInt(match[1])] = parseInt(match[2]);
            }

            if (Object.keys(offsets).length > 0) {
                return offsets;
            }

            const numericValues = text
                .split(/[\s,;]+/)
                .map(value => value.trim())
                .filter(Boolean)
                .map(Number)
                .filter(Number.isFinite);

            numericValues.forEach((value, index) => {
                offsets[index] = value;
            });

            return offsets;
        }

        function pasteOffsetsFromText(text) {
            const offsets = parseOffsetsText(text);
            const applied = applyOffsetsToInputs(offsets);

            if (applied > 0) {
                setStatus(`Applied ${applied} current offsets`);
            } else {
                setStatus('No offsets found to paste');
            }
        }

        function pasteOffsetsFromClipboard() {
            if (!navigator.clipboard?.readText) {
                setStatus('Clipboard paste unavailable');
                return;
            }

            navigator.clipboard.readText().then(pasteOffsetsFromText).catch(() => {
                setStatus('Clipboard paste blocked');
            });
        }

        function useRecommendationsAsCurrent() {
            if (!latestRecommendations) {
                setStatus('No recommendations to use');
                return;
            }

            const applied = applyOffsetsToInputs(latestRecommendations);
            setStatus(`Applied ${applied} recommendations as current`);
        }

        function clearCsv() {
            document.getElementById('csvText').value = '';
            document.getElementById('csvText').placeholder = DEFAULT_CSV_PLACEHOLDER;
            document.getElementById('fileName').textContent = '';
            uploadedCsvText = '';
            uploadedCsvName = '';
            activeAnalysisId++;
            clearTimeout(detectTimer);
            clearTimeout(autoAnalyzeTimer);
            clearProgress();
            detectedCoreCount = null;
            updateOffsetInputs();
            updateScopeLabel(null);
            setStatus('Waiting for CSV data');
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const analysisId = ++activeAnalysisId;
                const textArea = document.getElementById('csvText');
                const fileLabel = document.getElementById('fileName');
                const reader = new FileReader();
                clearTimeout(detectTimer);
                clearTimeout(autoAnalyzeTimer);
                uploadedCsvText = '';
                uploadedCsvName = file.name;
                textArea.value = '';
                textArea.placeholder = file.size > LARGE_TEXTAREA_LIMIT
                    ? `Large CSV loaded from ${file.name}; kept out of this text box for performance.`
                    : DEFAULT_CSV_PLACEHOLDER;
                fileLabel.textContent = `${file.name} (${formatBytes(file.size)})`;
                setProgress('Reading CSV', 0, `0 / ${formatBytes(file.size)}`);

                reader.onprogress = function(e) {
                    if (analysisId !== activeAnalysisId) return;
                    if (e.lengthComputable) {
                        const percent = file.size > 0 ? (e.loaded / e.total) * 100 : 100;
                        setProgress('Reading CSV', percent, `${formatBytes(e.loaded)} / ${formatBytes(e.total)}`);
                    } else {
                        setProgress('Reading CSV', null, formatBytes(e.loaded));
                    }
                };
                reader.onerror = function() {
                    if (analysisId !== activeAnalysisId) return;
                    clearProgress();
                    showError(document.getElementById('results'), `Could not read ${file.name}`);
                };
                reader.onload = async function(e) {
                    if (analysisId !== activeAnalysisId) return;
                    const text = e.target.result || '';
                    uploadedCsvText = text;
                    if (file.size <= LARGE_TEXTAREA_LIMIT) {
                        textArea.value = text;
                    }

                    updateDetectedCoreCountFromText(text);
                    await paintProgress('CSV loaded', 100, `${formatBytes(file.size)} ready`);
                    scheduleAutoAnalyze(text, 0);
                };
                reader.onloadend = function() {
                    event.target.value = '';
                };
                reader.readAsText(file);
            }
        }

        function getCurrentOffsets() {
            const coreCount = resolveCoreCount();
            const offsets = {};
            for (let i = 0; i < coreCount; i++) {
                const val = parseInt(document.getElementById(`offset${i}`).value) || 0;
                offsets[i] = val;
            }
            return offsets;
        }

        function updateDetectedCoreCountFromText(text) {
            if (!hasCsvContent(text)) {
                updateCoreCountLabel();
                return;
            }

            const headers = getCsvHeaders(text);
            const detected = detectCoreCount(headers);

            if (detected > 0 && detected !== detectedCoreCount) {
                detectedCoreCount = detected;
                if (document.getElementById('coreCount').value === 'auto') {
                    updateOffsetInputs();
                } else {
                    updateCoreCountLabel();
                }
            } else {
                updateCoreCountLabel();
            }
        }

        function scheduleAutoAnalyze(text = getActiveCsvText(), delay = 250) {
            clearTimeout(autoAnalyzeTimer);
            autoAnalyzeTimer = setTimeout(() => {
                if (canAnalyzeText(text)) {
                    analyzeData();
                }
            }, delay);
        }

        function canAnalyzeText(text) {
            if (!hasCsvContent(text)) return false;

            const headers = getCsvHeaders(text);
            if (headers.length === 0) return false;

            const hasCurrent = Boolean(resolveLoadSensor(headers));
            const hasVid = headers.some(isCoreVidColumn);
            return hasCurrent && hasVid;
        }

        function getCsvHeaders(text) {
            const firstLine = getFirstNonEmptyLine(text);
            if (!firstLine) return [];

            return parseCSVLine(firstLine).map(cleanCsvHeader);
        }

        function getFirstNonEmptyLine(text) {
            let cursor = 0;

            while (cursor < text.length) {
                const lineInfo = readCsvLine(text, cursor);
                const line = lineInfo.line.replace(/^\uFEFF/, '');
                if (line.trim()) return line;
                cursor = lineInfo.nextCursor;
            }

            return '';
        }

        function cleanCsvHeader(header) {
            return header.trim().replace(/^"|"$/g, '');
        }

        function normalizeHeader(header) {
            return String(header ?? '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase();
        }

        function headerHasUnit(header, unit) {
            return new RegExp(`\\[\\s*${unit}\\s*\\]`, 'i').test(header);
        }

        function containsAny(value, terms) {
            return terms.some(term => value.includes(term));
        }

        const CPU_TERMS = ['cpu', 'processor', 'prozessor', 'processeur', 'procesador', 'processore'];
        const CORE_TERMS = ['core', 'kern', 'coeur', 'noyau', 'nucleo'];
        const CURRENT_TERMS = ['current', 'strom', 'courant', 'corriente', 'corrente', 'amper'];
        const POWER_TERMS = ['power', 'leistung', 'puissance', 'potencia', 'potenza'];
        const VOLTAGE_TERMS = ['voltage', 'spannung', 'tension', 'voltaje', 'tensione'];
        const CLOCK_TERMS = ['clock', 'takt', 'frequenz', 'frequency', 'frequence', 'frecuencia', 'frequencia', 'frequenza'];
        const EFFECTIVE_TERMS = ['effective', 'effektiv', 'effectif', 'efectiv', 'effettiv', 'efetiv'];
        const USAGE_TERMS = ['usage', 'utility', 'auslastung', 'utilisation', 'utilization', 'utilizacion', 'uso', 'charge', 'utilizzo'];
        const CLOCK_EXCLUDE_TERMS = [
            'gpu',
            'l3',
            'cache',
            'bus',
            'memory',
            'speicher',
            'dram',
            'fabric',
            'fclk',
            'uclk',
            'limit',
            'grenzwert',
            'controller',
            'ratio'
        ];

        function isAverageHeader(normalizedHeader) {
            return containsAny(normalizedHeader, ['avg', 'average', 'durchschnitt', 'moyenne', 'promedio', 'media']);
        }

        function extractCoreIndex(header, allowLoose = false) {
            const normalized = normalizeHeader(header);
            const patterns = [
                /\bcore\s*#?\s*(\d+)\b/i,
                /\bcore(\d+)\b/i,
                /\bkern\s*#?\s*(\d+)\b/i,
                /\bcoeur\s*#?\s*(\d+)\b/i,
                /\bnoyau\s*#?\s*(\d+)\b/i,
                /\bnucleo\s*#?\s*(\d+)\b/i,
                /\bnucleo(\d+)\b/i
            ];

            for (const pattern of patterns) {
                const match = normalized.match(pattern);
                if (match) return parseInt(match[1]);
            }

            if (allowLoose && (/\bvid\b/.test(normalized) || /\bt\d+\b/.test(normalized) || /\bccd\s*\d+/.test(normalized))) {
                const firstNumber = normalized.match(/(?:^|[^\d])(\d+)(?:[^\d]|$)/);
                return firstNumber ? parseInt(firstNumber[1]) : null;
            }

            return null;
        }

        function isCoreVidColumn(header) {
            return headerHasUnit(header, 'V')
                && /\bvid\b/i.test(header)
                && extractCoreIndex(header, true) !== null;
        }

        function detectCoreCount(headers) {
            const coreIndexes = headers
                .filter(isCoreVidColumn)
                .map(h => extractCoreIndex(h, true))
                .filter(Number.isFinite);

            return coreIndexes.length > 0 ? Math.max(...coreIndexes) + 1 : 0;
        }

        function getCoreIndexFromVidColumn(col) {
            return isCoreVidColumn(col) ? extractCoreIndex(col, true) : null;
        }

        function detectCCDGroups(headers, coreIndexes) {
            const groups = {};
            const knownCores = new Set(coreIndexes);

            headers.forEach(header => {
                const ccdMatch = header.match(/\bCCD\s*(\d+)\b/i);
                if (!ccdMatch) return;

                const coreIdx = extractCoreIndex(header);
                const ccdIdx = parseInt(ccdMatch[1]);
                if (!knownCores.has(coreIdx)) return;

                const label = `CCD${ccdIdx}`;
                if (!groups[label]) groups[label] = [];
                if (!groups[label].includes(coreIdx)) groups[label].push(coreIdx);
            });

            if (Object.keys(groups).length === 0 && coreIndexes.length > 8) {
                const chunkSize = coreIndexes.length <= 16 ? Math.ceil(coreIndexes.length / 2) : 8;
                for (let i = 0; i < coreIndexes.length; i += chunkSize) {
                    groups[`CCD${Math.floor(i / chunkSize) + 1}`] = coreIndexes.slice(i, i + chunkSize);
                }
            }

            if (Object.keys(groups).length === 0) {
                groups.CPU = [...coreIndexes];
            }

            Object.values(groups).forEach(cores => cores.sort((a, b) => a - b));
            return groups;
        }

        function resolveAnalysisGroups(headers, coreIndexes) {
            const scope = document.getElementById('analysisScope').value;
            const ccdGroups = detectCCDGroups(headers, coreIndexes);

            if (scope === 'whole' || Object.keys(ccdGroups).length < 2) {
                const groups = { CPU: [...coreIndexes] };
                updateScopeLabel(groups);
                return groups;
            }

            updateScopeLabel(ccdGroups);
            return ccdGroups;
        }

        function getCoreGroupLabel(groups, coreIdx) {
            return Object.entries(groups).find(([, cores]) => cores.includes(coreIdx))?.[0] || 'CPU';
        }

        function calculateReferenceMeans(vidMeans, groups) {
            const referenceMeans = {};
            const groupMeans = {};
            const meansByCore = {};

            Object.entries(vidMeans).forEach(([col, mean]) => {
                const coreIdx = getCoreIndexFromVidColumn(col);
                if (coreIdx !== null) meansByCore[coreIdx] = mean;
            });

            Object.entries(groups).forEach(([group, cores]) => {
                const values = cores.map(core => meansByCore[core]).filter(Number.isFinite);
                if (values.length === 0) return;

                const groupMean = values.reduce((a, b) => a + b) / values.length;
                groupMeans[group] = groupMean;
                cores.forEach(core => {
                    referenceMeans[core] = groupMean;
                });
            });

            return { referenceMeans, groupMeans };
        }

        function readCsvLine(text, cursor) {
            const newlineIndex = text.indexOf('\n', cursor);
            let lineEnd = newlineIndex === -1 ? text.length : newlineIndex;
            if (lineEnd > cursor && text.charCodeAt(lineEnd - 1) === 13) {
                lineEnd--;
            }

            return {
                line: text.slice(cursor, lineEnd),
                nextCursor: newlineIndex === -1 ? text.length : newlineIndex + 1
            };
        }

        async function parseCSVAsync(text, analysisId) {
            let cursor = 0;
            let headerLine = '';

            while (cursor < text.length) {
                const lineInfo = readCsvLine(text, cursor);
                const line = lineInfo.line.replace(/^\uFEFF/, '');
                cursor = lineInfo.nextCursor;

                if (line.trim()) {
                    headerLine = line;
                    break;
                }
            }

            if (!headerLine || cursor >= text.length) return null;

            const headers = parseCSVLine(headerLine).map(cleanCsvHeader);
            const rows = [];
            let parsedLines = 0;
            let skippedRows = 0;
            let lastYield = performance.now();
            await paintProgress('Parsing CSV', 5, `${headers.length} columns`);

            while (cursor < text.length) {
                const lineInfo = readCsvLine(text, cursor);
                const line = lineInfo.line;
                cursor = lineInfo.nextCursor;

                if (!line.trim()) continue;

                const values = parseCSVLine(line);
                if (values.length === headers.length) {
                    const row = {};
                    headers.forEach((h, idx) => {
                        row[h] = values[idx];
                    });
                    rows.push(row);
                } else {
                    skippedRows++;
                }
                parsedLines++;

                if (parsedLines % 500 === 0 && performance.now() - lastYield >= ANALYSIS_YIELD_MS) {
                    ensureAnalysisCurrent(analysisId);
                    const percent = text.length > 0 ? 5 + (cursor / text.length) * 30 : 35;
                    const detail = `${rows.length.toLocaleString()} rows`;
                    setProgress('Parsing CSV', Math.min(35, percent), detail);
                    await yieldToBrowser();
                    lastYield = performance.now();
                }
            }

            const detail = skippedRows > 0
                ? `${rows.length.toLocaleString()} rows, ${skippedRows.toLocaleString()} skipped`
                : `${rows.length.toLocaleString()} rows`;
            await paintProgress('Parsing CSV', 35, detail);
            return { headers, rows };
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const next = line[i + 1];

                if (char === '"' && inQuotes && next === '"') {
                    current += '"';
                    i++;
                } else if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function rankedColumns(headers, scorer) {
            return headers
                .map((header, index) => ({ header, index, score: scorer(header) }))
                .filter(item => item.score > 0)
                .sort((a, b) => b.score - a.score || a.index - b.index);
        }

        function findBestColumn(headers, scorer) {
            return rankedColumns(headers, scorer)[0]?.header || null;
        }

        function isCpuHeader(normalizedHeader) {
            return containsAny(normalizedHeader, CPU_TERMS);
        }

        function isExcludedSvi3Rail(normalizedHeader) {
            return containsAny(normalizedHeader, ['soc', 'misc', 'gpu']);
        }

        function scoreDirectCurrentHeader(header) {
            const normalized = normalizeHeader(header);
            if (!headerHasUnit(header, 'A')) return 0;
            if (!isCpuHeader(normalized) || !normalized.includes('svi3')) return 0;
            if (isExcludedSvi3Rail(normalized)) return 0;

            let score = 50;
            if (normalized.includes('vddcr_vdd') || normalized.includes('vddcr vdd')) score += 25;
            if (containsAny(normalized, CORE_TERMS)) score += 15;
            if (containsAny(normalized, CURRENT_TERMS)) score += 20;
            return score;
        }

        function scoreCorePowerHeader(header) {
            const normalized = normalizeHeader(header);
            if (!headerHasUnit(header, 'W')) return 0;
            if (!isCpuHeader(normalized) || !normalized.includes('svi3')) return 0;
            if (isExcludedSvi3Rail(normalized) || normalized.includes('ppt')) return 0;

            let score = 45;
            if (containsAny(normalized, CORE_TERMS)) score += 20;
            if (containsAny(normalized, POWER_TERMS)) score += 20;
            if (normalized.includes('vddcr_vdd') || normalized.includes('vddcr vdd')) score += 5;
            return score;
        }

        function scoreVddVoltageHeader(header) {
            const normalized = normalizeHeader(header);
            if (!headerHasUnit(header, 'V')) return 0;
            if (!isCpuHeader(normalized) || !normalized.includes('svi3')) return 0;
            if (isExcludedSvi3Rail(normalized)) return 0;
            if (!normalized.includes('vddcr_vdd') && !normalized.includes('vddcr vdd')) return 0;

            let score = 70;
            if (containsAny(normalized, VOLTAGE_TERMS)) score += 20;
            return score;
        }

        function scoreTdcHeader(header) {
            const normalized = normalizeHeader(header);
            if (!headerHasUnit(header, 'A')) return 0;
            if (!isCpuHeader(normalized) || !/\btdc\b/.test(normalized)) return 0;
            return 70;
        }

        function resolveLoadSensor(headers) {
            const directCurrentCol = findBestColumn(headers, scoreDirectCurrentHeader);
            if (directCurrentCol) {
                return {
                    label: directCurrentCol,
                    kind: 'current',
                    note: 'direct SVI3 core current',
                    read: row => parseNumber(row[directCurrentCol])
                };
            }

            const corePowerCol = findBestColumn(headers, scoreCorePowerHeader);
            const vddVoltageCol = findBestColumn(headers, scoreVddVoltageHeader);
            if (corePowerCol && vddVoltageCol) {
                return {
                    label: `${corePowerCol} / ${vddVoltageCol}`,
                    kind: 'estimatedCurrent',
                    note: 'estimated from SVI3 core power / VDD voltage',
                    read: row => {
                        const power = parseNumber(row[corePowerCol]);
                        const voltage = parseNumber(row[vddVoltageCol]);
                        return Number.isFinite(power) && Number.isFinite(voltage) && voltage > 0.1
                            ? power / voltage
                            : NaN;
                    }
                };
            }

            const tdcCol = findBestColumn(headers, scoreTdcHeader);
            if (tdcCol) {
                return {
                    label: tdcCol,
                    kind: 'tdc',
                    note: 'CPU TDC fallback',
                    read: row => parseNumber(row[tdcCol])
                };
            }

            return null;
        }

        async function analyzeData() {
            const analysisId = ++activeAnalysisId;
            clearTimeout(autoAnalyzeTimer);
            const csvText = getActiveCsvText();
            const minCurrent = parseFloat(document.getElementById('minCurrent').value);
            const mvStep = parseFloat(document.getElementById('mvStep').value);
            const currentOffsets = getCurrentOffsets();
            const resultsDiv = document.getElementById('results');

            if (!hasCsvContent(csvText)) {
                clearProgress();
                showError(resultsDiv, 'Please upload or paste CSV data.');
                return;
            }

            if (!Number.isFinite(minCurrent) || !Number.isFinite(mvStep) || mvStep <= 0) {
                clearProgress();
                showError(resultsDiv, 'Minimum current and mV step must be valid numbers.');
                return;
            }

            setAnalysisBusy(true);
            try {
                await paintProgress('Preparing analysis', 2, uploadedCsvName || 'Pasted CSV');

                const data = await parseCSVAsync(csvText, analysisId);
                ensureAnalysisCurrent(analysisId);
                if (!data) {
                    throw new Error('Failed to parse CSV');
                }

                await paintProgress('Finding columns', 38, `${data.headers.length} columns`);

                const loadSensor = resolveLoadSensor(data.headers);
                if (!loadSensor) {
                    throw new Error('Could not find CPU core current, CPU TDC, or SVI3 core power + VDD voltage columns');
                }

                const detected = detectCoreCount(data.headers);
                if (detected > 0) {
                    detectedCoreCount = detected;
                    if (document.getElementById('coreCount').value === 'auto') {
                        updateOffsetInputs();
                    } else {
                        updateCoreCountLabel();
                    }
                }

                const selectedCoreCount = resolveCoreCount();
                const vidCols = data.headers
                    .filter(isCoreVidColumn)
                    .filter(h => {
                        const coreIdx = getCoreIndexFromVidColumn(h);
                        return coreIdx !== null && coreIdx < selectedCoreCount;
                    });
                const coreIndexes = vidCols
                    .map(getCoreIndexFromVidColumn)
                    .filter(Number.isFinite)
                    .sort((a, b) => a - b);

                if (vidCols.length === 0) {
                    throw new Error('Could not find any Core VID columns');
                }

                const validRows = await filterRowsByCurrentAsync(data.rows, loadSensor, minCurrent, analysisId);
                ensureAnalysisCurrent(analysisId);

                if (validRows.length === 0) {
                    throw new Error(`No rows found with load current >= ${minCurrent}A using ${loadSensor.note}`);
                }

                const vidMeans = await calculateVidMeansAsync(validRows, vidCols, analysisId);
                ensureAnalysisCurrent(analysisId);

                const meanValues = Object.values(vidMeans);
                const globalMean = meanValues.reduce((a, b) => a + b) / meanValues.length;
                const correlation = await calculateAvgCorrelationAsync(validRows, vidCols, analysisId);
                ensureAnalysisCurrent(analysisId);

                const groups = resolveAnalysisGroups(data.headers, coreIndexes);
                await paintProgress('Calculating offsets', 84, `${coreIndexes.length} cores`);
                const { referenceMeans, groupMeans } = calculateReferenceMeans(vidMeans, groups);
                const vidStats = calculateVidStats(vidMeans, referenceMeans);
                const clockStretch = await calculateClockStretchAsync(validRows, data.headers, coreIndexes, analysisId);
                ensureAnalysisCurrent(analysisId);
                const recommendations = calculateOffsets(vidMeans, referenceMeans, mvStep, currentOffsets, vidStats);

                await paintProgress('Rendering results', 97, `${validRows.length.toLocaleString()} filtered rows`);
                displayResults(resultsDiv, {
                    totalRows: data.rows.length,
                    validRows: validRows.length,
                    minCurrent,
                    stdDev: vidStats.stdDev,
                    maxDelta: vidStats.maxHighDelta,
                    correlation,
                    mvStep,
                    vidMeans,
                    globalMean,
                    referenceMeans,
                    groupMeans,
                    groups,
                    currentOffsets,
                    recommendations,
                    clockStretch,
                    loadSensor
                });
                setProgress('Analysis complete', 100, `${validRows.length.toLocaleString()} filtered rows`);
            } catch (error) {
                if (error.cancelled) return;
                clearProgress();
                showError(resultsDiv, error.message);
            } finally {
                if (analysisId === activeAnalysisId) {
                    setAnalysisBusy(false);
                }
            }
        }

        async function filterRowsByCurrentAsync(rows, loadSensor, minCurrent, analysisId) {
            const validRows = [];
            let lastYield = performance.now();

            for (let i = 0; i < rows.length; i++) {
                const current = loadSensor.read(rows[i]);
                if (Number.isFinite(current) && current >= minCurrent) {
                    validRows.push(rows[i]);
                }

                if (i % 5000 === 0 && performance.now() - lastYield >= ANALYSIS_YIELD_MS) {
                    ensureAnalysisCurrent(analysisId);
                    const percent = rows.length > 0 ? 38 + (i / rows.length) * 12 : 50;
                    setProgress('Filtering rows', percent, `${validRows.length.toLocaleString()} matched, ${loadSensor.note}`);
                    await yieldToBrowser();
                    lastYield = performance.now();
                }
            }

            await paintProgress('Filtering rows', 50, `${validRows.length.toLocaleString()} matched, ${loadSensor.note}`);
            return validRows;
        }

        async function calculateVidMeansAsync(rows, vidCols, analysisId) {
            const sums = {};
            const counts = {};
            let lastYield = performance.now();

            vidCols.forEach(col => {
                sums[col] = 0;
                counts[col] = 0;
            });

            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                vidCols.forEach(col => {
                    const value = parseFloat(row[col]);
                    if (!isNaN(value)) {
                        sums[col] += value;
                        counts[col]++;
                    }
                });

                if (i % 3000 === 0 && performance.now() - lastYield >= ANALYSIS_YIELD_MS) {
                    ensureAnalysisCurrent(analysisId);
                    const percent = rows.length > 0 ? 50 + (i / rows.length) * 10 : 60;
                    setProgress('Calculating VID means', percent, `${vidCols.length} cores`);
                    await yieldToBrowser();
                    lastYield = performance.now();
                }
            }

            const vidMeans = {};
            vidCols.forEach(col => {
                if (counts[col] > 0) {
                    vidMeans[col] = sums[col] / counts[col];
                }
            });

            await paintProgress('Calculating VID means', 60, `${Object.keys(vidMeans).length} cores`);
            return vidMeans;
        }

        async function calculateAvgCorrelationAsync(rows, cols, analysisId) {
            const n = cols.length;
            if (n < 2) return 0;

            const pairTotal = (n * (n - 1)) / 2;
            let pairIndex = 0;
            let sumCorr = 0;
            let count = 0;

            for (let i = 0; i < n; i++) {
                for (let j = i + 1; j < n; j++) {
                    const corr = await pearsonCorrelationAsync(rows, cols[i], cols[j], analysisId, pairIndex, pairTotal);
                    if (!isNaN(corr)) {
                        sumCorr += corr;
                        count++;
                    }
                    pairIndex++;
                }
            }

            await paintProgress('Calculating correlation', 82, `${pairTotal.toLocaleString()} pairs`);
            return count > 0 ? sumCorr / count : 0;
        }

        async function pearsonCorrelationAsync(rows, col1, col2, analysisId, pairIndex, pairTotal) {
            let n = 0;
            let sumX = 0;
            let sumY = 0;
            let sumXY = 0;
            let sumX2 = 0;
            let sumY2 = 0;
            let lastYield = performance.now();

            for (let i = 0; i < rows.length; i++) {
                const x = parseFloat(rows[i][col1]);
                const y = parseFloat(rows[i][col2]);

                if (!isNaN(x) && !isNaN(y)) {
                    n++;
                    sumX += x;
                    sumY += y;
                    sumXY += x * y;
                    sumX2 += x * x;
                    sumY2 += y * y;
                }

                if (i % 5000 === 0 && performance.now() - lastYield >= ANALYSIS_YIELD_MS) {
                    ensureAnalysisCurrent(analysisId);
                    const pairProgress = pairTotal > 0 ? (pairIndex + (i / rows.length)) / pairTotal : 1;
                    const percent = 60 + pairProgress * 22;
                    setProgress('Calculating correlation', percent, `${pairIndex + 1}/${pairTotal} pairs`);
                    await yieldToBrowser();
                    lastYield = performance.now();
                }
            }

            if (n < 2) return NaN;

            const numerator = n * sumXY - sumX * sumY;
            const denominator = Math.sqrt((n * sumX2 - sumX * sumX) * (n * sumY2 - sumY * sumY));

            return denominator === 0 ? 0 : numerator / denominator;
        }

        function calculateOffsets(vidMeans, referenceMeans, mvStep, currentOffsets, vidStats) {
            const recommendations = {};
            if (vidStats.stdDev <= mvStep) {
                Object.entries(vidMeans).forEach(([col]) => {
                    const coreIdx = getCoreIndexFromVidColumn(col);
                    if (coreIdx !== null) recommendations[coreIdx] = currentOffsets[coreIdx] || 0;
                });
                return recommendations;
            }

            const anchorCompensation = calculateAnchorCompensation(
                vidMeans,
                referenceMeans,
                currentOffsets,
                mvStep,
                vidStats
            );

            Object.entries(vidMeans).forEach(([col, vid]) => {
                const coreIdx = getCoreIndexFromVidColumn(col);
                if (coreIdx !== null && Number.isFinite(referenceMeans[coreIdx])) {
                    const deltaMv = (vid - referenceMeans[coreIdx]) * 1000;
                    const adjustedDeltaMv = deltaMv > 0 ? deltaMv + anchorCompensation : deltaMv;
                    const convergenceDelta = Math.max(vidStats.stdDev, vidStats.maxHighDelta);
                    const delta = calculateAdaptiveStep(adjustedDeltaMv, mvStep, convergenceDelta);
                    const baseOffset = currentOffsets[coreIdx] || 0;
                    let recommended = baseOffset + delta;

                    recommended = Math.max(-50, Math.min(0, recommended));
                    recommendations[coreIdx] = recommended;
                }
            });

            return recommendations;
        }

        function calculateAnchorCompensation(vidMeans, referenceMeans, currentOffsets, mvStep, vidStats) {
            if (vidStats.stdDev < mvStep * 2) return 0;

            const fixedLowDeltas = Object.entries(vidMeans)
                .map(([col, vid]) => {
                    const coreIdx = getCoreIndexFromVidColumn(col);
                    if (coreIdx === null || !Number.isFinite(referenceMeans[coreIdx])) return null;

                    const currentOffset = currentOffsets[coreIdx] || 0;
                    const deltaMv = (vid - referenceMeans[coreIdx]) * 1000;
                    return currentOffset >= 0 && deltaMv < -mvStep * 0.5 ? deltaMv : null;
                })
                .filter(Number.isFinite);

            if (fixedLowDeltas.length === 0) return 0;

            const meanFixedLow = fixedLowDeltas.reduce((sum, delta) => sum + delta, 0) / fixedLowDeltas.length;
            return Math.min(mvStep * 4, Math.abs(meanFixedLow) * 0.6);
        }

        function calculateAdaptiveStep(deltaMv, mvStep, convergenceDelta) {
            const magnitude = Math.abs(deltaMv);
            if (magnitude < mvStep * 0.5) return 0;

            const rawSteps = magnitude / mvStep;
            const stillConverging = convergenceDelta >= mvStep;
            const steps = stillConverging ? Math.max(1, Math.round(rawSteps)) : Math.floor(rawSteps);

            if (steps < 1) return 0;

            return -Math.sign(deltaMv) * steps;
        }

        function calculateVidStats(vidMeans, referenceMeans) {
            const deltas = Object.entries(vidMeans)
                .map(([col, mean]) => {
                    const coreIdx = getCoreIndexFromVidColumn(col);
                    if (coreIdx === null || !Number.isFinite(referenceMeans[coreIdx])) return null;
                    return (mean - referenceMeans[coreIdx]) * 1000;
                })
                .filter(Number.isFinite);

            if (deltas.length === 0) {
                return { stdDev: 0, maxDelta: 0 };
            }

            const variance = deltas.reduce((sum, delta) => sum + Math.pow(delta, 2), 0) / deltas.length;
            const stdDev = Math.sqrt(variance);
            const maxAbsDelta = Math.max(...deltas.map(Math.abs));
            const maxHighDelta = Math.max(0, ...deltas);

            return { stdDev, maxDelta: maxAbsDelta, maxHighDelta };
        }

        async function calculateClockStretchAsync(rows, headers, coreIndexes, analysisId) {
            const summaries = {};
            await paintProgress('Checking clock stretch', 85, `${coreIndexes.length} cores`);

            for (let corePosition = 0; corePosition < coreIndexes.length; corePosition++) {
                const core = coreIndexes[corePosition];
                const clockCol = findBestCoreColumn(headers, core, scoreReportedClockHeader);
                const effectiveCol = findBestCoreColumn(headers, core, scoreEffectiveClockHeader);
                if (!clockCol || !effectiveCol) continue;

                const c0Col = findBestCoreColumn(headers, core, scoreC0Header);
                const usageCols = findCoreColumns(headers, core, scoreThreadActivityHeader);

                const reported = [];
                const effective = [];
                const stretchPct = [];
                const stretchMhz = [];
                let lastYield = performance.now();

                for (let rowIndex = 0; rowIndex < rows.length; rowIndex++) {
                    const row = rows[rowIndex];
                    const clock = parseNumber(row[clockCol]);
                    const eff = parseNumber(row[effectiveCol]);
                    if (!Number.isFinite(clock) || !Number.isFinite(eff) || clock < 3000 || eff <= 0) continue;

                    const c0 = c0Col ? parseNumber(row[c0Col]) : NaN;
                    if (Number.isFinite(c0) && c0 < 90) continue;

                    if (usageCols.length > 0) {
                        const usageValues = usageCols.map(col => parseNumber(row[col])).filter(Number.isFinite);
                        if (usageValues.length > 0) {
                            const maxUsage = Math.max(...usageValues);
                            if (maxUsage < 80) continue;
                        }
                    }

                    const diff = Math.max(0, clock - eff);
                    reported.push(clock);
                    effective.push(eff);
                    stretchMhz.push(diff);
                    stretchPct.push((diff / clock) * 100);

                    if (rowIndex % 3000 === 0 && performance.now() - lastYield >= ANALYSIS_YIELD_MS) {
                        ensureAnalysisCurrent(analysisId);
                        const coreProgress = coreIndexes.length > 0
                            ? (corePosition + rowIndex / Math.max(rows.length, 1)) / coreIndexes.length
                            : 1;
                        setProgress('Checking clock stretch', 85 + coreProgress * 10, `Core ${core}`);
                        await yieldToBrowser();
                        lastYield = performance.now();
                    }
                }

                if (stretchPct.length === 0) continue;

                const medianPct = percentile(stretchPct, 0.5);
                const p95Pct = percentile(stretchPct, 0.95);
                let status = 'ok';
                if (medianPct >= 7 || p95Pct >= 10) status = 'suspect';
                else if (medianPct >= 4 || p95Pct >= 6) status = 'watch';

                summaries[core] = {
                    rows: stretchPct.length,
                    reportedMean: mean(reported),
                    effectiveMean: mean(effective),
                    stretchMeanMhz: mean(stretchMhz),
                    medianPct,
                    p95Pct,
                    status
                };
            }

            const values = Object.values(summaries);
            const worst = values.reduce((current, item) => {
                if (!current) return item;
                return item.p95Pct > current.p95Pct ? item : current;
            }, null);
            const suspectCount = values.filter(item => item.status === 'suspect').length;
            const watchCount = values.filter(item => item.status === 'watch').length;

            await paintProgress('Checking clock stretch', 95, values.length > 0 ? `${values.length} cores checked` : 'No clock columns');
            return {
                available: values.length > 0,
                summaries,
                worstP95: worst ? worst.p95Pct : 0,
                suspectCount,
                watchCount
            };
        }

        function findBestCoreColumn(headers, core, scorer) {
            return findBestColumn(headers, header => scorer(header, core));
        }

        function findCoreColumns(headers, core, scorer) {
            return rankedColumns(headers, header => scorer(header, core)).map(item => item.header);
        }

        function scoreReportedClockHeader(header, core) {
            const normalized = normalizeHeader(header);
            if (!headerHasUnit(header, 'MHz')) return 0;
            if (extractCoreIndex(header, true) !== core) return 0;
            if (isAverageHeader(normalized) || containsAny(normalized, CLOCK_EXCLUDE_TERMS)) return 0;
            if (containsAny(normalized, EFFECTIVE_TERMS) || /\bt\d+\b/.test(normalized)) return 0;

            let score = 35;
            if (containsAny(normalized, CLOCK_TERMS)) score += 40;
            if (containsAny(normalized, CORE_TERMS)) score += 10;
            if (/\bperf\b/.test(normalized)) score += 5;
            return score;
        }

        function scoreEffectiveClockHeader(header, core) {
            const normalized = normalizeHeader(header);
            if (!headerHasUnit(header, 'MHz')) return 0;
            if (extractCoreIndex(header, true) !== core) return 0;
            if (isAverageHeader(normalized) || containsAny(normalized, CLOCK_EXCLUDE_TERMS)) return 0;

            const hasThreadTag = /\bt\d+\b/.test(normalized);
            const hasEffectiveWord = containsAny(normalized, EFFECTIVE_TERMS);
            if (!hasThreadTag && !hasEffectiveWord) return 0;

            let score = 35;
            if (hasEffectiveWord) score += 40;
            if (hasThreadTag) score += 20;
            if (containsAny(normalized, CLOCK_TERMS)) score += 10;
            return score;
        }

        function scoreC0Header(header, core) {
            const normalized = normalizeHeader(header);
            if (!headerHasUnit(header, '%')) return 0;
            if (extractCoreIndex(header, true) !== core) return 0;
            if (!/\bc0\b/.test(normalized)) return 0;

            let score = 50;
            if (containsAny(normalized, ['residency', 'residenz', 'residence', 'residencia'])) score += 20;
            return score;
        }

        function scoreThreadActivityHeader(header, core) {
            const normalized = normalizeHeader(header);
            if (!headerHasUnit(header, '%')) return 0;
            if (extractCoreIndex(header, true) !== core) return 0;
            if (isAverageHeader(normalized) || /\bc0\b/.test(normalized)) return 0;
            if (!/\bt\d+\b/.test(normalized)) return 0;

            let score = 30;
            if (containsAny(normalized, USAGE_TERMS)) score += 40;
            return score;
        }

        function parseNumber(value) {
            const number = parseFloat(String(value ?? '').replace(',', '.'));
            return Number.isFinite(number) ? number : NaN;
        }

        function mean(values) {
            return values.reduce((sum, value) => sum + value, 0) / values.length;
        }

        function percentile(values, fraction) {
            if (values.length === 0) return 0;
            const sorted = [...values].sort((a, b) => a - b);
            const index = Math.min(sorted.length - 1, Math.max(0, Math.ceil(sorted.length * fraction) - 1));
            return sorted[index];
        }

        function showError(container, message) {
            container.className = '';
            container.innerHTML = `<div class="message error">Error: ${escapeHTML(message)}</div>`;
            setStatus('Needs attention');
        }

        function escapeHTML(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function formatChange(value) {
            if (value === 0) return 'no change';
            return `${value > 0 ? '+' : ''}${value} from current`;
        }

        function buildCopyText(recommendations, groups) {
            const lines = [];
            const groupEntries = Object.entries(groups);

            groupEntries.forEach(([group, cores]) => {
                if (groupEntries.length > 1) lines.push(`${group}:`);
                cores
                    .filter(core => Object.prototype.hasOwnProperty.call(recommendations, core))
                    .sort((a, b) => a - b)
                    .forEach(core => {
                        lines.push(`${groupEntries.length > 1 ? '  ' : ''}Core ${core}: ${recommendations[core]}`);
                    });
            });

            return lines.length > 0 ? lines.join('\n') : Object.entries(recommendations)
                .sort((a, b) => parseInt(a[0]) - parseInt(b[0]))
                .map(([core, offset]) => `Core ${core}: ${offset}`)
                .join('\n');
        }

        function copyRecommendations() {
            const text = document.getElementById('copyText')?.textContent || '';
            if (!text) return;

            navigator.clipboard.writeText(text).then(() => {
                setStatus('Recommendations copied');
            }).catch(() => {
                setStatus('Copy unavailable');
            });
        }

        function displayResults(container, results) {
            latestRecommendations = { ...results.recommendations };
            const sortedVid = Object.entries(results.vidMeans).sort((a, b) => {
                const aCore = getCoreIndexFromVidColumn(a[0]) ?? 0;
                const bCore = getCoreIndexFromVidColumn(b[0]) ?? 0;
                return aCore - bCore;
            });
            const sortedRecs = Object.entries(results.recommendations).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
            const copyText = buildCopyText(results.recommendations, results.groups);
            const validPercent = ((results.validRows / results.totalRows) * 100).toFixed(1);
            const groupCount = Object.keys(results.groups).length;
            const scopeLabel = groupCount > 1 ? `${groupCount} CCD groups` : 'Whole CPU';
            const rowStatus = getFilteredRowStatus(results.validRows);
            const rowLabel = getFilteredRowLabel(results.validRows);
            const spreadStatus = getSpreadStatus(results.stdDev, results.mvStep);
            const maxDeltaStatus = getMaxDeltaStatus(results.maxDelta, results.mvStep);
            const correlationStatus = getCorrelationStatus(results.correlation);
            const guidance = buildGuidance(results, maxDeltaStatus, correlationStatus, rowStatus);
            const clockStretchStatus = getClockStretchStatus(results.clockStretch);

            let html = '';
            html += `<div class="message ${guidance.kind}">${guidance.text}</div>`;
            if (results.loadSensor?.kind === 'estimatedCurrent') {
                html += `<div class="message info" style="margin-top: 10px;">Direct SVI3 core current was not present in this log, so load filtering used a calculated current estimate from SVI3 core power divided by VDD voltage. This is fine for selecting heavy-load rows.</div>`;
            } else if (results.loadSensor?.kind === 'tdc') {
                html += `<div class="message warn" style="margin-top: 10px;">Load filtering used CPU TDC because direct CPU core current was not present. Treat row filtering as a fallback estimate.</div>`;
            }
            if (results.clockStretch?.suspectCount > 0) {
                html += `<div class="message warn" style="margin-top: 10px;">${buildClockStretchWarning(results.clockStretch)}</div>`;
            }
            html += '<div class="metrics" style="margin-top: 16px;">';
            html += metricHTML('Filtered rows', `${results.validRows}`, `${rowLabel} / ${validPercent}% of log`, rowStatus);
            html += metricHTML('VID std dev', results.stdDev.toFixed(3), 'mV overall spread', spreadStatus);
            html += metricHTML('Max high VID delta', results.maxDelta.toFixed(3), `target < ${results.mvStep} mV`, maxDeltaStatus);
            html += metricHTML('Correlation', results.correlation.toFixed(3), 'target >= 0.950', correlationStatus);
            html += metricHTML('Scope', scopeLabel, groupCount > 1 ? 'per-CCD baseline' : 'single baseline');
            html += metricHTML('Clock stretch', formatClockStretchMetric(results.clockStretch), 'worst p95 reported/effective gap', clockStretchStatus);
            html += metricHTML('Load filter', formatLoadSensorMetric(results.loadSensor), `threshold >= ${results.minCurrent} A`);
            html += '</div>';

            html += '<div class="result-grid">';
            html += '<div class="result-card">';
            html += '<div class="card-head"><h3>Per-core VID</h3></div>';
            html += '<table><thead><tr><th>Core</th><th>Group</th><th>Mean VID</th><th>Delta</th></tr></thead><tbody>';
            sortedVid.forEach(([col, mean]) => {
                const coreIdx = getCoreIndexFromVidColumn(col);
                if (coreIdx !== null) {
                    const group = getCoreGroupLabel(results.groups, coreIdx);
                    const delta = (mean - results.referenceMeans[coreIdx]) * 1000;
                    const deltaClass = delta >= 0 ? 'positive' : 'negative';
                    html += `<tr><td>Core ${coreIdx}</td><td>${group}</td><td>${mean.toFixed(6)} V</td><td class="${deltaClass}">${delta >= 0 ? '+' : ''}${delta.toFixed(3)} mV</td></tr>`;
                }
            });
            html += '</tbody></table></div>';

            html += '<div class="result-card">';
            html += '<div class="card-head"><h3>Recommended offsets</h3><div class="button-row"><button type="button" class="ghost-btn" onclick="useRecommendationsAsCurrent()">Use</button><button type="button" class="ghost-btn" onclick="copyRecommendations()">Copy</button></div></div>';
            if (sortedRecs.length === 0) {
                html += '<p style="padding: 14px; margin: 0; color: var(--muted);">No recommendations available.</p>';
            } else {
                html += '<div class="recommendation-list">';
                sortedRecs.forEach(([core, offset]) => {
                    const current = results.currentOffsets[core] || 0;
                    const change = offset - current;
                    const group = getCoreGroupLabel(results.groups, parseInt(core));
                    html += `<div class="rec-chip"><strong>${group} / Core ${core}</strong><div class="rec-value">${offset}</div><div class="rec-change">${formatChange(change)}</div></div>`;
                });
                html += '</div>';
                html += `<pre id="copyText" class="copy-box">${escapeHTML(copyText)}</pre>`;
            }
            html += '</div></div>';

            if (results.clockStretch?.available) {
                html += '<div class="result-card" style="margin-top: 14px;">';
                html += '<div class="card-head"><h3>Clock Stretching</h3></div>';
                html += '<table><thead><tr><th>Core</th><th>Rows</th><th>Reported</th><th>Effective</th><th>Median gap</th><th>P95 gap</th><th>Status</th></tr></thead><tbody>';
