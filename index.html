                Object.entries(results.clockStretch.summaries)
                    .sort((a, b) => parseInt(a[0]) - parseInt(b[0]))
                    .forEach(([core, item]) => {
                        const statusClass = item.status === 'suspect' ? 'positive' : item.status === 'watch' ? '' : 'negative';
                        html += `<tr><td>Core ${core}</td><td>${item.rows}</td><td>${item.reportedMean.toFixed(0)} MHz</td><td>${item.effectiveMean.toFixed(0)} MHz</td><td>${item.medianPct.toFixed(1)}%</td><td>${item.p95Pct.toFixed(1)}%</td><td class="${statusClass}">${formatStretchStatus(item.status)}</td></tr>`;
                    });
                html += '</tbody></table></div>';
            }

            container.className = '';
            container.innerHTML = html;
        }

        function getClockStretchStatus(clockStretch) {
            if (!clockStretch?.available) return '';
            if (clockStretch.suspectCount > 0) return 'bad';
            if (clockStretch.watchCount > 0) return 'warn';
            return 'good';
        }

        function formatClockStretchMetric(clockStretch) {
            if (!clockStretch?.available) return 'n/a';
            return `${clockStretch.worstP95.toFixed(1)}%`;
        }

        function buildClockStretchWarning(clockStretch) {
            const suspectCores = Object.entries(clockStretch.summaries)
                .filter(([, item]) => item.status === 'suspect')
                .map(([core]) => `Core ${core}`)
                .join(', ');
            return `Possible clock stretching on ${suspectCores}. Treat VID recommendations from this log cautiously; reduce negative CO on suspect cores or verify with another workload before chasing VID balance.`;
        }

        function formatStretchStatus(status) {
            if (status === 'suspect') return 'Suspect';
            if (status === 'watch') return 'Watch';
            return 'OK';
        }

        function formatLoadSensorMetric(loadSensor) {
            if (!loadSensor) return 'n/a';
            if (loadSensor.kind === 'current') return 'Current';
            if (loadSensor.kind === 'estimatedCurrent') return 'Est. current';
            if (loadSensor.kind === 'tdc') return 'CPU TDC';
            return 'Fallback';
        }

        function getSpreadStatus(stdDev, mvStep) {
            if (stdDev <= mvStep) return 'good';
            if (stdDev <= mvStep * 2) return 'warn';
            return 'bad';
        }

        function getMaxDeltaStatus(maxDelta, mvStep) {
            if (maxDelta < mvStep) return 'good';
            if (maxDelta < mvStep * 2) return 'warn';
            return 'bad';
        }

        function getFilteredRowStatus(validRows) {
            if (validRows >= 30) return 'good';
            if (validRows >= 10) return 'warn';
            return 'bad';
        }

        function getFilteredRowLabel(validRows) {
            if (validRows >= 100) return 'high confidence';
            if (validRows >= 30) return 'usable';
            if (validRows >= 10) return 'low confidence';
            return 'too few rows';
        }

        function getCorrelationStatus(correlation) {
            if (correlation >= 0.95) return 'good';
            if (correlation >= 0.9) return 'warn';
            return 'bad';
        }

        function getLargestRecommendationChange(recommendations, currentOffsets) {
            const changes = Object.entries(recommendations).map(([core, offset]) => {
                const current = currentOffsets[core] || 0;
                return Math.abs(offset - current);
            });

            return changes.length > 0 ? Math.max(...changes) : 0;
        }

        function buildGuidance(results, maxDeltaStatus, correlationStatus, rowStatus) {
            const largestChange = getLargestRecommendationChange(results.recommendations, results.currentOffsets);

            if (rowStatus === 'bad') {
                return {
                    kind: 'error',
                    text: 'Too few filtered rows. Collect a longer or heavier log before trusting recommendations.'
                };
            }

            if (rowStatus === 'warn' && largestChange <= 1) {
                return {
                    kind: 'success',
                    text: 'Filtered row count is low and recommendations are only one-step changes. Collect another log or ignore tiny adjustments.'
                };
            }

            if (correlationStatus === 'good' && maxDeltaStatus === 'good') {
                if (largestChange <= 1) {
                    return {
                        kind: 'success',
                        text: 'Looks converged: VID correlation is strong and the largest high-VID core delta is below one CO step. Start stability testing. Only keep tuning if the same core keeps asking for the same direction across fresh logs.'
                    };
                }

                return {
                    kind: 'success',
                    text: 'VID quality looks good. The per-core pattern is probably dialed in; preserve it and move all cores together for stability-limit testing.'
                };
            }

            if (correlationStatus === 'good' && maxDeltaStatus !== 'good') {
                return {
                    kind: 'success',
                    text: 'Correlation is good, but the largest high-VID core delta is still above one CO step. One more harmonization pass may help before lockstep stability testing.'
                };
            }

            if (correlationStatus === 'warn') {
                if (maxDeltaStatus === 'good') {
                    return {
                        kind: 'success',
                        text: 'The largest high-VID core delta is already below one CO step. Correlation is only moderate, so treat remaining small changes as noise and move toward stability testing.'
                    };
                }

                return {
                    kind: 'success',
                    text: 'The largest high-VID core delta is still above target and correlation is usable. Consider one conservative harmonization pass, then verify with a fresh log.'
                };
            }

            if (maxDeltaStatus === 'good') {
                return {
                    kind: 'success',
                    text: 'The largest high-VID core delta is already below one CO step. Correlation is low, so do not chase remaining changes; move toward stability testing.'
                };
            }

            if (maxDeltaStatus === 'warn') {
                return {
                    kind: 'success',
                    text: 'The largest high-VID core delta is close but correlation is low. Ignore one-step changes; either verify with a fresh log or move to stability testing.'
                };
            }

            return {
                kind: 'success',
                text: 'The largest high-VID core delta is still high, so another conservative harmonization pass can still help. Verify with a fresh log afterward.'
            };
        }

        function metricHTML(label, value, unit, status = '') {
            return `
                <div class="metric ${status}">
                    <div class="metric-label">${label}</div>
                    <div class="metric-value">${value}</div>
                    <div class="metric-unit">${unit}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
